<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoodVault | AI Recipe Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        :root {
            --primary: #00d1ff;
            --primary-glow: rgba(0, 209, 255, 0.3);
            --accent: #7000ff;
            --accent-glow: rgba(112, 0, 255, 0.3);
            --bg-dark: #09090b;
            --card-glass: rgba(255, 255, 255, 0.03);
            --card-glass-hover: rgba(255, 255, 255, 0.06);
            --card-border: rgba(255, 255, 255, 0.08);
            --text-main: #fafafa;
            --text-muted: #a1a1aa;
            --text-dim: #6b7280;
            --success: #10b981;
            --success-glow: rgba(16, 185, 129, 0.3);
            --warning: #ffb92d;
            --warning-glow: rgba(255, 185, 45, 0.3);
            --danger: #ff4e4e;
            --danger-glow: rgba(255, 78, 78, 0.3);
        }

        body {
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(112, 0, 255, 0.15) 0%, transparent 35%),
                radial-gradient(circle at 100% 100%, rgba(0, 209, 255, 0.1) 0%, transparent 35%);
            background-attachment: fixed;
            color: var(--text-main);
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 280px;
            background: rgba(15, 15, 20, 0.8);
            backdrop-filter: blur(20px);
            display: flex;
            flex-direction: column;
            padding: 2.5rem 1.5rem;
            position: fixed;
            height: calc(100vh - 40px);
            margin: 20px;
            border-radius: 24px;
            border: 1px solid var(--card-border);
            z-index: 100;
        }

        .brand {
            font-size: 1.6rem;
            font-weight: 800;
            background: linear-gradient(to right, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 3rem;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .nav-menu { display: flex; flex-direction: column; gap: 8px; }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 16px;
            color: var(--text-muted);
            text-decoration: none;
            border-radius: 14px;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .nav-item:hover {
            background: var(--card-glass);
            color: var(--text-main);
            transform: translateX(5px);
        }

        .nav-item.active {
            background: linear-gradient(135deg, rgba(0, 209, 255, 0.1), rgba(112, 0, 255, 0.1));
            border: 1px solid var(--primary-glow);
            color: var(--primary);
        }

        /* Main Content */
        .main-content {
            margin-left: 320px;
            flex: 1;
            padding: 2.5rem;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2.5rem;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(to right, #fff, var(--text-muted));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            color: var(--text-muted);
            margin-top: 0.5rem;
        }

        .ai-badge {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            padding: 0.8rem 2rem;
            border-radius: 40px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 0 30px var(--primary-glow);
        }

        /* Expiring Ingredients Section */
        .expiring-section {
            background: var(--card-glass);
            backdrop-filter: blur(10px);
            border: 1px solid var(--card-border);
            border-radius: 32px;
            padding: 2rem;
            margin-bottom: 2.5rem;
        }

        .section-title {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 1.5rem;
            font-size: 1.3rem;
            color: var(--warning);
        }

        .ingredients-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 1rem;
        }

        .ingredient-chip {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--card-border);
            border-radius: 40px;
            padding: 0.8rem 1.2rem;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: 0.3s;
        }

        .ingredient-chip:hover {
            border-color: var(--warning);
            transform: translateY(-2px);
            box-shadow: 0 0 20px var(--warning-glow);
        }

        .ingredient-chip.warning {
            border-color: var(--warning);
            background: var(--warning-glow);
        }

        .ingredient-icon {
            font-size: 1.2rem;
        }

        .ingredient-name {
            flex: 1;
            font-weight: 500;
        }

        .expiry-badge {
            font-size: 0.7rem;
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            background: var(--warning-glow);
            color: var(--warning);
        }

        /* AI Recipe Suggestions */
        .recipes-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 2rem;
            margin-bottom: 2.5rem;
        }

        .recipe-card {
            background: var(--card-glass);
            backdrop-filter: blur(10px);
            border: 1px solid var(--card-border);
            border-radius: 32px;
            padding: 2rem;
            transition: 0.3s;
            position: relative;
            overflow: hidden;
        }

        .recipe-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            opacity: 0;
            transition: 0.3s;
        }

        .recipe-card:hover {
            transform: translateY(-8px);
            border-color: var(--primary);
            box-shadow: 0 20px 30px -10px var(--primary-glow);
        }

        .recipe-card:hover::before {
            opacity: 1;
        }

        .recipe-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .recipe-title {
            font-size: 1.4rem;
            font-weight: 700;
        }

        .match-badge {
            background: var(--success-glow);
            color: var(--success);
            padding: 0.3rem 1rem;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 600;
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .recipe-image {
            width: 100%;
            height: 180px;
            border-radius: 20px;
            margin-bottom: 1.5rem;
            object-fit: cover;
            border: 1px solid var(--card-border);
        }

        .ingredients-list {
            margin: 1.5rem 0;
        }

        .ingredient-row {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 0.5rem 0;
            border-bottom: 1px solid var(--card-border);
        }

        .ingredient-row.have {
            color: var(--success);
        }

        .ingredient-row.have i {
            color: var(--success);
        }

        .ingredient-row.need {
            color: var(--text-muted);
        }

        .ingredient-row.need i {
            color: var(--warning);
        }

        .check-icon {
            width: 20px;
        }

        .instructions {
            color: var(--text-muted);
            font-size: 0.9rem;
            line-height: 1.6;
            margin: 1.5rem 0;
            padding: 1rem;
            background: rgba(255,255,255,0.02);
            border-radius: 16px;
        }

        .recipe-footer {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
        }

        .btn-recipe {
            flex: 1;
            padding: 0.8rem;
            border-radius: 12px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px var(--primary-glow);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--card-border);
            color: var(--text-main);
        }

        .btn-outline:hover {
            border-color: var(--primary);
            background: rgba(255,255,255,0.05);
        }

        /* Shopping List Section */
        .shopping-section {
            background: var(--card-glass);
            backdrop-filter: blur(10px);
            border: 1px solid var(--card-border);
            border-radius: 32px;
            padding: 2rem;
            margin-top: 2rem;
        }

        .shopping-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .shopping-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 1rem;
        }

        .shopping-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem;
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            transition: 0.3s;
        }

        .shopping-item:hover {
            border-color: var(--primary);
            background: rgba(255,255,255,0.05);
        }

        .shopping-item i {
            color: var(--warning);
            font-size: 1.2rem;
        }

        .item-details {
            flex: 1;
        }

        .item-name {
            font-weight: 600;
            margin-bottom: 0.2rem;
        }

        .item-quantity {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .add-to-cart {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            border: 1px solid var(--card-border);
            background: transparent;
            color: var(--primary);
            cursor: pointer;
            transition: 0.3s;
        }

        .add-to-cart:hover {
            background: var(--primary);
            color: var(--bg-dark);
        }

        /* Loading Animation */
        .ai-thinking {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 2rem;
            background: var(--card-glass);
            border-radius: 60px;
            margin: 2rem 0;
        }

        .pulse-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--primary);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.5); opacity: 0.5; }
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { 
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border-radius: 10px; 
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .sidebar { width: 80px; padding: 2rem 1rem; }
            .sidebar span, .brand span { display: none; }
            .main-content { margin-left: 120px; }
            .recipes-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>

                    <i class="fas fa-download"></i> Export List
                </button>
            </div>
            <div class="shopping-list" id="shoppingList">
                <!-- Shopping items will be inserted here -->
            </div>
        </div>
    </main>

    <script>
        const DB_KEY = 'foodvault_pro_v5';
        let inventory = JSON.parse(localStorage.getItem(DB_KEY)) || [];

        // Recipe database with ingredients and instructions
        const recipeDatabase = [
            {

            },

            {

                ],
                instructions: "1. Cook oats with milk. 2. Dice apples. 3. Combine with cinnamon. 4. Top with honey and walnuts.",

            },
            {

                image: "https://images.unsplash.com/photo-1547592166-23ac45744acd?w=600&h=400&fit=crop",

                ],
                instructions: "1. Sauté vegetables. 2. Add chicken and broth. 3. Simmer for 30 minutes. 4. Season with herbs.",
                prepTime: "15 mins",
                cookTime: "40 mins",
                difficulty: "Medium"
            },
            {
                name: "Fruit Smoothie Bowl",
                image: "https://images.unsplash.com/photo-1490324160354-bf679ae7a1c3?w=600&h=400&fit=crop",
                ingredients: [
                    { name: "Bananas", category: "Fruits" },
                    { name: "Berries", category: "Fruits" },
                    { name: "Yogurt", category: "Dairy" },
                    { name: "Milk", category: "Dairy" },
                    { name: "Honey", category: "Sweeteners" },
                    { name: "Granola", category: "Grains" }
                ],
                instructions: "1. Blend fruits with yogurt and milk. 2. Pour into bowl. 3. Top with granola and fresh fruit.",
                prepTime: "10 mins",
                cookTime: "0 mins",
                difficulty: "Easy"
            }
        ];

        // Find expiring ingredients (within 3 days)
        function getExpiringIngredients() {
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            
            return inventory.filter(item => {
                if (item.donated) return false;
                const expDate = new Date(item.exp);
                const diffDays = Math.ceil((expDate - today) / (1000 * 60 * 60 * 24));
                return diffDays <= 3 && diffDays >= 0;
            });
        }

        // Display expiring ingredients
        function displayExpiringIngredients() {
            const expiring = getExpiringIngredients();
            const container = document.getElementById('expiringIngredients');
            
            if (expiring.length === 0) {
                container.innerHTML = `
                    <div style="grid-column: 1/-1; text-align: center; padding: 2rem; color: var(--text-muted);">
                        <i class="fas fa-smile" style="font-size: 3rem; margin-bottom: 1rem; color: var(--success);"></i>
                        <p>No ingredients expiring soon! Your pantry is fresh.</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = expiring.map(item => `
                <div class="ingredient-chip warning">
                    <span class="ingredient-icon">${getIngredientIcon(item.cat)}</span>
                    <span class="ingredient-name">${item.name}</span>
                    <span class="expiry-badge">${getDaysUntilExpiry(item.exp)}d</span>
                </div>
            `).join('');
        }

        // Get icon for category
        function getIngredientIcon(category) {
            const icons = {
                'Vegetables': '🥦',
                'Fruits': '🍎',
                'Dairy': '🥛',
                'Protein': '🥩',
                'Bakery': '🍞',
                'Grains': '🌾',
                'Spices': '🧂',
                'Condiments': '🫙',
                'default': '📦'
            };
            return icons[category] || icons.default;
        }

        // Calculate days until expiry
        function getDaysUntilExpiry(expDate) {
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const exp = new Date(expDate);
            return Math.ceil((exp - today) / (1000 * 60 * 60 * 24));
        }

        // AI Recipe Matching
        function findMatchingRecipes() {
            const expiring = getExpiringIngredients();
            const expiringNames = expiring.map(item => item.name.toLowerCase());
            const expiringCategories = expiring.map(item => item.cat);

            // Score each recipe based on matching ingredients
            const scoredRecipes = recipeDatabase.map(recipe => {
                let matchCount = 0;
                let totalIngredients = recipe.ingredients.length;
                let missingIngredients = [];

                recipe.ingredients.forEach(ingredient => {
                    // Check if ingredient is in inventory and not expired
                    const inInventory = inventory.some(item => 
                        item.name.toLowerCase().includes(ingredient.name.toLowerCase()) && 
                        !item.donated &&
                        getDaysUntilExpiry(item.exp) > 0
                    );

                    if (inInventory) {
                        matchCount++;
                    } else {
                        missingIngredients.push(ingredient);
                    }
                });

                const matchPercentage = Math.round((matchCount / totalIngredients) * 100);
                
                return {
                    ...recipe,
                    matchPercentage,
                    matchCount,
                    totalIngredients,
                    missingIngredients
                };
            });

            // Filter recipes with at least one matching ingredient and sort by match percentage
            return scoredRecipes
                .filter(recipe => recipe.matchCount > 0)
                .sort((a, b) => b.matchPercentage - a.matchPercentage)
                .slice(0, 4); // Show top 4 recipes
        }

        // Display recipes
        function displayRecipes() {
            const recipes = findMatchingRecipes();
            const grid = document.getElementById('recipesGrid');
            const shoppingSection = document.getElementById('shoppingSection');
            
            if (recipes.length === 0) {
                grid.innerHTML = `
                    <div style="grid-column: 1/-1; text-align: center; padding: 4rem; background: var(--card-glass); border-radius: 32px;">
                        <i class="fas fa-robot" style="font-size: 4rem; color: var(--primary); margin-bottom: 1rem;"></i>
                        <h3 style="margin-bottom: 1rem;">No Recipe Matches Yet</h3>
                        <p style="color: var(--text-muted);">Add more ingredients to your pantry for AI recipe suggestions.</p>
                    </div>
                `;
                shoppingSection.style.display = 'none';
                return;
            }

            grid.innerHTML = recipes.map(recipe => {
                const haveIngredients = recipe.ingredients.filter(ing => 
                    inventory.some(item => 
                        item.name.toLowerCase().includes(ing.name.toLowerCase()) && 
                        !item.donated &&
                        getDaysUntilExpiry(item.exp) > 0
                    )
                );

                return `
                    <div class="recipe-card">
                        <div class="recipe-header">
                            <h3 class="recipe-title">${recipe.name}</h3>
                            <span class="match-badge">${recipe.matchPercentage}% Match</span>
                        </div>
                        <img src="${recipe.image}" alt="${recipe.name}" class="recipe-image">
                        <div class="ingredients-list">
                            ${recipe.ingredients.map(ing => {
                                const have = haveIngredients.some(h => h.name === ing.name);
                                return `
                                    <div class="ingredient-row ${have ? 'have' : 'need'}">
                                        <i class="fas ${have ? 'fa-check-circle' : 'fa-exclamation-circle'} check-icon"></i>
                                        <span>${ing.name}</span>
                                        ${!have ? '<span style="margin-left: auto; font-size: 0.7rem; color: var(--warning);">missing</span>' : ''}
                                    </div>
                                `;
                            }).join('')}
                        </div>
                        <div class="instructions">
                            <i class="fas fa-clock" style="color: var(--primary);"></i> ${recipe.prepTime} prep · ${recipe.cookTime} cook · ${recipe.difficulty}
                        </div>
                        <div class="recipe-footer">
                            <button class="btn-recipe btn-primary" onclick="viewRecipe('${recipe.name}')">
                                <i class="fas fa-eye"></i> View Recipe
                            </button>
                            <button class="btn-recipe btn-outline" onclick="generateShoppingList('${recipe.name}')">
                                <i class="fas fa-shopping-cart"></i> Get List
                            </button>
                        </div>
                    </div>
                `;
            }).join('');

            // Show shopping section if there are recipes
            if (recipes.length > 0) {
                generateShoppingList(recipes[0].name); // Show shopping list for first recipe
            }
        }

        // Generate shopping list for a recipe
        function generateShoppingList(recipeName) {
            const recipe = recipeDatabase.find(r => r.name === recipeName);
            if (!recipe) return;

            const missingIngredients = recipe.ingredients.filter(ing => 
                !inventory.some(item => 
                    item.name.toLowerCase().includes(ing.name.toLowerCase()) && 
                    !item.donated &&
                    getDaysUntilExpiry(item.exp) > 0
                )
            );

            const shoppingSection = document.getElementById('shoppingSection');
            const shoppingList = document.getElementById('shoppingList');

            if (missingIngredients.length === 0) {
                shoppingList.innerHTML = `
                    <div style="grid-column: 1/-1; text-align: center; padding: 2rem;">
                        <i class="fas fa-check-circle" style="font-size: 3rem; color: var(--success); margin-bottom: 1rem;"></i>
                        <p>You have all ingredients for ${recipeName}!</p>
                    </div>
                `;
            } else {
                shoppingList.innerHTML = missingIngredients.map(ing => `
                    <div class="shopping-item">
                        <i class="fas ${getIngredientIcon(ing.category)}"></i>
                        <div class="item-details">
                            <div class="item-name">${ing.name}</div>
                            <div class="item-quantity">1 unit · ${ing.category}</div>
                        </div>
                        <button class="add-to-cart" onclick="addToShoppingList('${ing.name}')">
                            <i class="fas fa-plus"></i>
                        </button>
                    </div>
                `).join('');
            }

            shoppingSection.style.display = 'block';
        }

        // Add item to shopping list (could be extended to save to localStorage)
        function addToShoppingList(itemName) {
            alert(`✅ ${itemName} added to your shopping list!`);
        }

        // Export shopping list
        function exportShoppingList() {
            const shoppingItems = document.querySelectorAll('.shopping-item .item-name');
            if (shoppingItems.length === 0) {
                alert('Shopping list is empty!');
                return;
            }

            let list = 'Shopping List for FoodVault Recipes:\n\n';
            shoppingItems.forEach(item => {
                list += `• ${item.textContent}\n`;
            });

            // Create and download file
            const blob = new Blob([list], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'foodvault-shopping-list.txt';
            a.click();
        }

        // View full recipe (could open modal)
        function viewRecipe(recipeName) {
            alert(`Opening full recipe for ${recipeName}...\n\nCheck the shopping list for missing ingredients!`);
        }

        // Simulate AI thinking
        function simulateAIThinking() {
            const aiThinking = document.getElementById('aiThinking');
            aiThinking.style.display = 'flex';
            
            setTimeout(() => {
                aiThinking.style.display = 'none';
                displayRecipes();
            }, 2000);
        }

        // Initialize page
        function init() {
            displayExpiringIngredients();
            simulateAIThinking();
        }

        // Listen for inventory updates
        window.addEventListener('storage', (e) => {
            if (e.key === DB_KEY) {
                inventory = JSON.parse(e.newValue) || [];
                init();
            }
        });

        // Initial load
        init();
    </script>
</body>
</html>
